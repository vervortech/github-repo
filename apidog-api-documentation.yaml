      description: >-
        Returns mappings that have been deleted from your account since the specified `lastUpdateDateTime`. It is recommended to fetch deleted mappings regularly to prevent incorrect bookings.


        Mappings are deleted in the following scenarios:

        - The property is disabled by the supplier.

        - Duplicate properties are merged, and the redundant property is disabled (rare).
      operationId: mappings/GetDeletedMappings
      tags:
        - Hotel Mapping/Mappings
        - Mappings
      parameters:
        - name: resumeKey
          in: query
          description: >-
            An encoded pagination token for incremental data retrieval.
            Pass the resumeKey from the previous response to fetch the next
            page of results. A null value indicates no further records are
            available. The resumeKey expires after 14 days.
          required: false
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: limit
