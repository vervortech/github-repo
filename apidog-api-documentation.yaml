          schema:
            type: string
        - name: accountId
          in: header
          description: The account ID of your registered account in Vervotech Mappings.
          required: true
          example: DemoAccount
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResumeKey:
                    $ref: '#/components/schemas/ResumeKey'
                  Mappings:
                    $ref: '#/components/schemas/HotelMapping'
                  Status:
                    $ref: '#/components/schemas/Status'
                  Message:
                    $ref: '#/components/schemas/Message'
                  StatusCode:
                    description: '[References - API Status codes](#tag/References)'
                    example: 2000
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Unknown Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security: []
