  /api/Location/getLocationById:
    get:
      summary: Get Location by ID
      deprecated: false
      description: >-
        Returns detailed location information for the specified location ID, including full name, coordinates, city/state/country hierarchy, geographic boundaries, and data source. Location data is sourced from OpenStreetMap.
      tags:
        - Hotel Mapping/Location Content
        - Location
      parameters:
        - name: locationId
          in: query
          description: ID of the location to be fetched.
          required: true
          schema:
            type: string
        - name: apikey
          in: header
          description: The API key for your account.
          required: true
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: accountId
          in: header
          description: The account ID of your registered account in Vervotech Mappings.
          required: true
          example: DemoAccount
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                    description: >-
                      A human-readable message providing details about the API
                      call status.
                    nullable: true
                  statusCode:
                    type: integer
                    format: int32
                  location:
                    description: >-
                      The location object containing detailed geographic
                      information for the requested location ID.
                    type: object
                    properties:
                      coordinates:
                        $ref: >-
                          #/components/schemas/Unica.DataContracts.Common.GeoCode
                      locationId:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      code:
                        type: string
                        nullable: true
                      fullName:
                        type: string
                        nullable: true
                      type:
                        type: string
                        nullable: true
                      city:
                        type: string
                        nullable: true
                      state:
                        type: string
                        nullable: true
                      country:
                        type: string
                        nullable: true
                      shape:
                        type: string
                        nullable: true
                      dataSource:
                        type: string
                        nullable: true
                      cityCode:
                        type: string
                        nullable: true
                      postalCode:
                        type: string
                        nullable: true
                      boundaries:
                        type: array
                        description: Geographical boundary polygon coordinates.
                        items:
                          type: array
                          items:
                            $ref: >-
                              #/components/schemas/Unica.DataContracts.Common.GeoCode
                        nullable: true
              example:
                Status: true
                Message: Success
                StatusCode: 2000
                Location:
                  Shape: Polygon
                  DataSource: OpenStreetMap
                  CityCode: CNP
                  PostalCode: null
                  LocationId: '100'
                  Name: Jameson Land
                  Code: CNP
                  FullName: Jameson Land, Sermersooq, Greenland
                  Type: City
                  City: Jameson Land
                  State: Sermersooq
                  Country: GL
                  Coordinates:
                    Lat: 70.68355
                    Long: -22.737888
                  Boundaries:
                    - - Lat: 70.76491
                        Long: -22.948914
          headers: {}
      security: []
