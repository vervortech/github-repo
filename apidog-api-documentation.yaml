                  items:
                    type: strings
                    example: EANV3
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Status:
                    $ref: '#/components/schemas/Status'
                  Message:
                    $ref: '#/components/schemas/Message'
