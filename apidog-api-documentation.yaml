      security: []
  /mappings:
    get:
      summary: Get Mappings
      deprecated: false
      description: >-
        Returns all new and updated hotel mappings on your account since the specified `lastUpdateDateTime`. This is the recommended API for incremental synchronization of mappings.


        - If a response contains a VervotechId not yet in your system, create a new hotel record for it.

        - Mappings are typically updated when property content changes at the supplier end.
      operationId: mappings/GetMappings
      tags:
        - Hotel Mapping/Mappings
        - Mappings
      parameters:
        - name: resumeKey
          in: query
          description: >-
            An encoded pagination token for incremental data retrieval.
            Pass the resumeKey from the previous response to fetch the next
            page of results. A null value indicates no further records are
            available. The resumeKey expires after 14 days.
          required: false
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: limit
          in: query
          description: >
            Maximum number of items to return per page. Maximum allowed
            value is 1000.
          required: false
          schema:
            type: number
            default: 10
        - name: lastUpdateDateTime
          in: query
          description: >
            The starting date and time for incremental data retrieval.
            Format: `yyyy-MM-ddTHH:mm:ssZ`.
          required: true
          example: '2019-04-10T06:30:00Z'
          schema:
            type: string
        - name: providerFamily
          in: query
          description: >
            Optional. Provider family name. If omitted, results include
            all providers associated with the account. See
            [Get All Provider Names](#operation/accountconfig/GetAllProviderNames)
            for valid values.
          required: false
          example: EAN
          schema:
            type: string
        - name: syncId
          in: header
          description: >-
            A unique identifier for each content synchronization cycle.
            All API calls within a single sync run should share the same
            syncId to distinguish them from other sync cycles. Use a
            GUID/UUID or any unique string value.
