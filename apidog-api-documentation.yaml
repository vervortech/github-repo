    RoomMappingBody:
      type: array
      items:
        type: object
        required:
          - index
          - code
          - roomName
          - provider
          - providerHotelId
        properties:
          index:
            type: number
            description: >-
              Index is unique value for the rooms available from all the
              providers for one particular hotel. For example, if you are using
              5 providers e.g., Expedia, Agoda, Priceline, HotelBeds and CTrip.
              All of these 5 providers are providing you 10 rooms each for any
              one particular hotel. So, you will have 5 (providers) * 10 (rooms
              per provider) = 50 rooms. So, any unique index value should be
              assigned to these 50 rooms in the data . The index values can
              range for 1 to 50 in this case. Similarly, index value for rooms
              of any other hotel in the sheet, can have the index value assigned
              from 1 to n (n is total number of rooms for that hotel). Its an
              integer value.
            example: 1
          code:
            type: string
            description: Room Code provided by the provider.
            example: '201997202'
          roomName:
            type: string
            description: Room name provided by the provider.
            example: Deluxe Room, 1 King Bed, 1 KingBed, Refundable
          description:
            type: string
            description: Room Description provided by the provider.
            example: Deluxe Room, 1 King Bed, 1 KingBed, Refundable
          provider:
            type: string
            description: >-
              Provider standard Name. Example- `EAN` , `HotelBeds`, `CTrip`,
              `ClearTrip`, `TravelPort`, `Agoda`, `Priceline`, `Tourico`,
              `DOTW`, `Smyrooms` etc. There is an API to get the master list of
              all the valid provider names. Please refer that API to decide the
              names for your providers. If the provider name is not available in
              the master provider names, then please contact Vervotech mappings
              team.
            example: hotelbeds
          providerHotelId:
            type: string
            description: Hotel id for by provider for this hotel.
            example: 18113069
          view:
            type: string
            description: Room View information if provided by the provider.
            example: Sea View
          smokingAllowed:
            type: string
            description: Optional.
            enum:
              - Unknown
              - Allowed
              - NotAllowed
            example: Allowed
          beds:
            type: array
            items:
              type: object
              properties:
                size:
                  type: string
                  example: King, Queen, Twin, Triple, Double, Quadruple
                description:
                  type: string
                  example: 1 Queen Bed
                count:
                  type: number
                  description: Count of bed.
                  example: 1
                type:
                  type: string
                  description: bed type.
                  example: King
