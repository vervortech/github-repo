    RoomMappingResponse2:
      type: object
      properties:
        success:
          type: boolean
          description: >-
            Mandatory. True if the API call is successful. False if the API call
            is unsuccessful.
          example: true
        message:
          type: string
          description: >-
            Options. Error message in case of API call failure. Empty in case of
            successful response.
        statusCode:
          type: number
          description: |
            See [References - API Status codes](#tag/References)
        standardRooms:
          type: array
          items:
            type: object
            properties:
              providerRoomContent:
                $ref: '#/components/schemas/ProviderRoomContent'
              id:
                type: string
                description: Identifier for the standardised room.
                example: '1'
              description:
                type: string
                description: Room Description for the standardised room.
                example: >-
                  A sea face room with air conditioning and extra rollaway beds
                  available
              standardName:
                type: string
                description: >-
                  The suggested display name by our algorithm for the
                  standardised room.
                example: Deluxe - King (Burj Khalifa View)
              masterTitle:
                type: string
                description: The room name given by the official hotel website.
                example: King Deluxe Room with Burj Khalifa View
              category:
                type: string
                description: >-
                  The standardised room category for the hotel. Examples -
                  Standard, Executive etc.
                example: Deluxe
              view:
                type: string
                description: >-
                  Optional. The standardised room view information for this
                  particular room category if available. Examples - Sea, Garden
                  etc.
                example: Burj Khalifa
              roomLocation:
                type: string
                description: >-
                  The standardised room location information for this particular
                  room if available. Examples - Highfloor, Oceanfront, Seaside
                  etc.
                example: Highfloor
              beds:
                type: array
                items:
                  $ref: '#/components/schemas/Bed'
              bedInfo:
                type: string
                description: Human-readable summary of bed configuration for the room.
                example: 1 King Bed
              occupancyType:
                type: string
                description: >-
                  This field represents the occupancy type of the room. Examples
                  :- Single,Double, Triple and Quadruple
                example: Single
              facilities:
                type: array
                description: Standardised room amenities
                items:
                  $ref: '#/components/schemas/Facility'
              attributes:
                type: array
                description: >-
                  Room category specific attributes - `SmokingAllowed,
                  HasBalcony, HasTerrace, Accessible, HasSofaBed, HasBunkBed,
                  HasSoloUse, HasMurphyOrWallBed, HasTrundleBed, HasKitchen,
                  SharedBathroom`.
                items:
                  $ref: '#/components/schemas/KeyValue'
              mappedRoomRates:
                type: array
                description: >-
                  These are the "index" values from the API request which are
                  grouped in to this particular standardised room in the
                  response. For example, if the input contains 10 rooms with
                  index values 1,2,3,4,5,6,7,8,9 and 10. "mappedRoomRates"
                  fields specify which all indexes from the input rooms are
                  grouped in this standardised room. So, the value for
                  mappedRoomRates for this room can be combination of any room
                  indexes from the input.
                items:
                  $ref: '#/components/schemas/MappedRoomRate'
                example:
                  - inputIndex: 1
                    roomCode: 201997202
                    boardBasis: FullBoard
                    refundability: Non Refundable
                    attributes:
                      - key: RoomSize
                        value: 200-250 SQFT
                  - inputIndex: 2
                    roomCode: 201997203
                    boardBasis: Breakfast
                    refundability: Refundable
                    attributes:
                      - key: RoomSize
                        value: 200-250 SQFT
                  - inputIndex: 3
                    roomCode: 201997204
                    boardBasis: Room Only
                    refundability: Refundable
                    attributes:
                      - key: RoomSize
                        value: 200-250 SQFT
