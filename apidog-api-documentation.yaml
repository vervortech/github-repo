  /mappings/StartMappingByFtpFolder:
    get:
      summary: Start Mapping by SFTP Folder
      deprecated: false
      description: >
        Triggers the hotel mapping process for provider content files uploaded to the SFTP server. Follow the steps below to prepare, upload, and initiate mapping.


        ---


        ### Step 1: Prepare Hotel Content Files


        [Download content template](https://hotelmapping.vervotech.com/documentation/unica-mapping-content-template.csv)


        **Requirements:**

        - File extension must be `.csv`

        - Create a separate file for each provider

        - Column names must match the template exactly (case-sensitive)

        - Do not include invalid values such as `NULL`, `null`, or whitespace


        **Template columns:**


        | Column | Required | Description |
        |--------|----------|-------------|
        | SupplierName | Yes | Provider name from the [master list](https://docs.vervotech.com/get-all-provider-names-16383705e0) |
        | SupplierHotelId | Yes | Property ID from the provider |
        | HotelName | Yes | Property name |
        | Line1 | Yes | Address line 1 |
        | Line2 | No | Address line 2 |
        | CityName | Yes | City name |
        | CityCode | No | City/location code |
        | StateName | No | State name |
        | StateCode | No | State code |
        | ZipCode | Yes | Postal/zip code |
        | CountryName | Conditional | Country name (either CountryName or CountryCode is required) |
        | CountryCode | Conditional | ISO country code (either CountryName or CountryCode is required) |
        | StarRating | Yes | Star rating |
        | Lat | Yes | Latitude |
        | Long | Yes | Longitude |
        | ChainCode | No | Hotel chain code |
        | Phones | No | Phone numbers |
        | Fax | No | Fax number |
        | Email | No | Email address |
        | Website | No | Official website URL |
        | PropertyType | No | Property type (e.g., Hotel, Motel, Resort, Villa) |


        ---


        ### Step 2: Upload Files to SFTP


        **2.1** Connect to the SFTP server using any SFTP client. Retrieve credentials from the Vervotech client portal under **Load Provider Content**.


        **2.2** Create the directory structure at the SFTP root:


        `[FTP Root]/[DATE]/[ProviderName]/[ProviderKey]`


        | Component | Format | Description |
        |-----------|--------|-------------|
        | DATE | DDMMYYYY | Upload date |
        | ProviderName | String | Provider name from the [master list](https://docs.vervotech.com/get-all-provider-names-16383705e0). Contact [Vervotech Support](https://support.vervotech.com/support/tickets) if not listed. |
        | ProviderKey | String | Provider key from the Vervotech client portal under **Manage Your Providers**. |


        **2.3** Upload one CSV file per folder (recommended). Example paths:

        ```
        18122022/HotelBeds/accountId__accountId__HotelBeds/HotelBedsProperties.csv
        18122022/Priceline/accountId__accountId__Priceline/PricelineProperties.csv
        18122022/EAN/accountId__accountId__EAN/EANProperties.csv
        ```


        ---


        ### Step 3: Trigger Mapping via Client Portal


        1. Log in to the Vervotech client portal.

        2. Navigate to **Load Provider Content**.

        3. Enter the full SFTP folder path and click **Start Mapping**.

        4. A unique RunId is generated for each file. Wait for processing to complete before uploading new files.


        ---


        ### Step 4: Monitor Progress


        Check mapping progress under **Providers Content Processing** in the client portal using the RunId.


        ---


        ### Step 5: Trigger Mapping via API


        Automate the workflow programmatically:

        1. Upload files using an SFTP client.

        2. Call this API with the SFTP folder path as input.

        3. The response includes a RunId for tracking progress.


        ---


      operationId: mappings/StartMappingByFtpFolder
      tags:
        - Hotel Mapping/Operational APIs
        - Operational APIs
      parameters:
        - name: templateType
          in: query
          description: |
            File template followed in the uploaded file.
          required: true
          example: Vervotech_Template
          schema:
            type: string
        - name: folderName
          in: query
          description: |
            Name of the folder where the file is uploaded.
          required: true
          example: 18122019/HotelBeds/johndoe__johndoe__HotelBeds
          schema:
            type: string
        - name: apikey
          in: header
          description: The API key for your account.
          required: true
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: accountId
          in: header
          description: The account ID of your registered account in Vervotech Mappings.
          required: true
          example: DemoAccount
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Status:
                    $ref: '#/components/schemas/Status'
                  Message:
                    $ref: '#/components/schemas/Message'
                  RunId:
                    type: string
                    description: >-
                      This is a unique key representing the initiated FTP
                      mapping call. This Run id can be used to track the status
                      of the mapping initiated.
                    deprecated: true
                    example: rc1234-3232-5657
                  MappingStats:
                    type: array
                    description: Mapping statistics for every file in the folder
                    items:
                      $ref: '#/components/schemas/MappingsStats'
                  StatusCode:
                    description: '[References - API Status codes](#tag/References)'
                    example: 2000
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Unknown Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security: []
