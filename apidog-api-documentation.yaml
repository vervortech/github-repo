      deprecated: false
      description: >
        Verifies hotel mappings for booked properties by processing a CSV file uploaded to SFTP. It is recommended to upload daily booked Vervotech mapping IDs for verification. If an incorrect mapping is detected, you will be notified via your registered email address.


        ---


        #### Step 1: Prepare the Input File


        [Download input template](https://hotelmapping.vervotech.com/documentation/VerifyMappingsForBookings_Result.csv)


        **Requirements:**

        - File extension must be `.csv`

        - Use comma (`,`) as separator and double quotes (`”`) as delimiter

        - All template columns must be present; column names are case-sensitive

        - Do not include invalid values such as `NULL`, `null`, or whitespace


        **Input columns:**


        | Column | Required | Description |
        |--------|----------|-------------|
        | Vervotech Mappings Id | Yes | Vervotech ID of the booked property |
        | BookingReferenceId | No | Booking reference from your system |
        | BookingClientName | No | Client name for the booking |
        | ProviderName | No | Provider name for the booking |
        | ProviderHotelId | No | Provider hotel ID |
        | CheckInDate | No | Check-in date (format: DDMMYYYY) |
        | CheckOutDate | No | Check-out date (format: DDMMYYYY) |


        ---


        #### Step 2: Upload to SFTP


        1. Connect to the SFTP server using any SFTP client.

        2. Create the directory path: `[FTP Root]/VerifyMappings/[MMYYYY]/[DDMMYYYY].csv`

        3. Upload your file. Example path: `VerifyMappings/102020/18102020.csv`


        ---


        #### Step 3: Trigger Verification


        Call this API endpoint with the `ftpFilePath` parameter pointing to your uploaded file.


        ---


        #### Step 4: Retrieve Results


        The result file is uploaded to the same SFTP directory as the input file, with the naming convention: `[FullDate]_Result.csv`


        [Download output template](https://hotelmapping.vervotech.com/documentation/VerifyMappingsForBookings_Result.csv)
