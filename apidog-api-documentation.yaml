openapi: 3.0.1
info:
  title: Vervotech Mapping APIs
  description: >
    Vervotech Mapping APIs provide hotel property mapping and room mapping capabilities for travel technology companies.


    **Hotel Mapping** enables you to deduplicate hotel properties across multiple suppliers by assigning a unique Vervotech ID to each property. You can synchronize mappings incrementally, retrieve curated content, and manage provider data.


    **Room Mapping** standardizes room types across suppliers for the same hotel, enabling accurate room-level comparisons. It supports real-time, asynchronous, file-based, and board basis mapping workflows.


    For authentication, include your `accountId` and `apikey` (or `token` for Room Mapping APIs) in the request headers.
  version: 1.0.0
tags:
  - name: Hotel Mapping/Metadata Content
    description: >-
      Reference data APIs that return master lists such as hotel facilities, chains, brands, property types, countries, provider names, and Vervotech IDs. Use these endpoints to bootstrap your integration.
  - name: Metadata Content
  - name: Hotel Mapping/Mappings
    description: >-
      Core mapping APIs for synchronizing hotel property mappings. Retrieve new, updated, and deleted mappings incrementally, view mapping statistics, and export mapping data.
  - name: Mappings
  - name: Hotel Mapping/Curated Content
    description: >-
      Retrieve curated hotel content that combines the best available data from all providers, including property details, facilities, and location information.
  - name: Curated Content
  - name: Hotel Mapping/Provider Content
    description: >-
      Access raw provider-level hotel content and identify unmapped properties that could not be matched during the mapping process.
  - name: Provider Content
  - name: Hotel Mapping/Location Content
    description: >-
      Location data APIs powered by OpenStreetMap. Retrieve detailed location information including coordinates, boundaries, and hierarchical geography data.
  - name: Location
  - name: Hotel Mapping/Operational APIs
    description: >-
      Workflow APIs for uploading provider hotel content via SFTP, triggering mapping jobs, tracking mapping progress, and verifying booked hotel mappings.
  - name: Operational APIs
  - name: Hotel Mapping/Dynamic Mapping APIs
    description: >-
      Real-time mapping API that finds matching hotels across providers based on hotel name, address, and coordinates. Useful for on-demand mapping of hotels not yet in the system.
  - name: Dynamic Mapping APIs
  - name: Hotel Mapping/Dual Mapping APIs
    description: >-
      Look up cross-provider hotel mappings and curated content in real time using a provider hotel ID. Includes usage statistics for monitoring API consumption.
  - name: Dual Mapping APIs
  - name: Room Mapping/Mapping API
    description: >-
      Real-time room mapping API that groups rooms from multiple providers for a single hotel into standardized room categories with attributes such as bed type, view, and amenities.
  - name: Room Mapping APIs
  - name: Room Mapping/Async Room Mapping API
    description: >-
      Asynchronous room mapping for large requests exceeding 1,000 rooms. Submit a mapping request and retrieve results using a trace ID.
  - name: Async Room Mapping API
  - name: Room Mapping/Board Basis Mappings
    description: >-
      Standardize meal plan terminology from different suppliers. Retrieve master board basis definitions and map raw supplier terms to standardized codes such as BB (Bed and Breakfast) and HB (Half Board).
  - name: Room Mapping/File Based Room Mapping (Offline)
    description: >
      Offline room mapping via file upload. Provide room information from your suppliers in CSV format and receive standardized room mappings in return.


      **Processing Limits:** A maximum of 100,000 rooms are processed per batch. Records beyond this limit are skipped automatically. This limit can be overridden via the `ROOM_BATCH_LIMIT` environment variable.


      ---


      ### Input File Columns


      | Column | Required | Description |
      |--------|----------|-------------|
      | **VervotechHotelId** | Recommended | The Vervotech ID assigned to the property. If omitted, the system attempts a lookup using Provider and ProviderHotelId. If lookup fails, an ID is auto-generated in the format `{Provider}_{ProviderHotelId}`. Without this value, rooms from different providers for the same hotel cannot be grouped correctly. |
      | **Provider** | Yes | Supplier name. Must match the [master provider names](https://docs.vervotech.com/get-all-provider-names-16946072e0). |
      | **ProviderHotelId** | Yes | The property ID assigned by the supplier. |
      | **RoomCode** | Yes | The room code from the supplier. Do not include rate plan codes. |
      | **RoomName** | Yes | The room name from the supplier. |
      | **Description** | No | Room description from the supplier. |
      | **Bed** | No | Bedding information from the supplier. |
      | **View** | No | View information from the supplier. |
      | **Refundability** | No | Refundability information from the supplier. |
      | **BoardBasis** | No | Board basis information from the supplier. |


      Do not insert values in JSON or array format. Leave optional columns empty if no data is available.


      ---


      ### Output File Columns


      | Column | Description |
      |--------|-------------|
      | **VervotechId** | Unique identifier assigned to the mapped room. |
      | **ProviderHotelId** | The property ID assigned by the supplier. |
      | **Provider** | Supplier name from the [master provider list](https://docs.vervotech.com/get-all-provider-names-16946072e0). |
      | **GroupId** | Composite key in the format `VervotechHotelId-GroupId`. |
      | **RoomCode** | Room code from the supplier. |
      | **RoomName** | Room name from the supplier. |
      | **MappedStandardName** | Standardized room name generated by Vervotech algorithms. |
      | **MappedMasterTitle** | Room name from the official hotel website. |
      | **MasterRoomId** | Master ID from Vervotech master data. Empty if no match is found. |
      | **MappedCategory** | Room category extracted from the room name. |
      | **MappedView** | View category extracted from the room name. |
      | **MappedBedType** | Bed type extracted from the room name. |
      | **MappedAttributes** | Unique room features extracted from the room name. |
      | **MappedOccupancy** | Maximum occupancy as reported by the supplier. |
