                        it on Unica's cloud storage and give the URL for that
                        downloaded image in "Href" field.
                    ProviderHref:
                      type: string
                      description: >-
                        The image URL given by the provider. It is recommended
                        to use "ProviderHref" over "Href".
                      example: http://heroimage.png
                    Size:
                      type: string
                      description: Size of image
                      enum:
                        - Unknown
                        - Standard
                        - XL
                        - XXL
