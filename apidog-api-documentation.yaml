  /mappings/ExportMappingsFile:
    get:
      summary: Export Mappings File
      deprecated: false
      description: >
        Exports all mappings for the given account as CSV files and delivers them via email and SFTP. Access the files using the SFTP credentials provided during account setup.


        #### Generated Files


        **1. Mapping File** (`accountname_mappings_guid.csv`)

        Contains per-provider mapping data with the following columns:

        | Column | Description |
        |--------|-------------|
        | UnicaId | Vervotech hotel ID |
        | ProviderHotelId | Property ID from the provider |
        | ProviderFamily | Provider name |
        | ModifiedOn | Date the mapping was last updated |
        | ChannelIds | Channel name and rate plan type |
        | ProviderLocationId | Destination code grouped under the Vervotech ID |


        [Download mapping file template](https://hotelmapping.vervotech.com/documentation/accountname_mappings_f8b3216d-f558-4398-a498-9f279b76a625.csv)


        **2. Transformed Mapping File** (`accountname_transformed_guid.csv`)

        Contains mappings in a pivoted format with Vervotech ID and provider-specific hotel IDs as columns.


        [Download transformed mapping file template](https://hotelmapping.vervotech.com/documentation/accountname_transformed_mappings_f8b3216d-f558-4398-a498-9f279b76a625.csv)


        **3. Content File** (`accountname_hotels_guid.csv`)

        Contains curated hotel content with the following columns:

        | Column | Description |
        |--------|-------------|
        | UnicaId | Vervotech hotel ID |
        | HotelName | Property name |
        | Lat / Long | Property coordinates |
        | AddressLine1 / AddressLine2 | Property address |
        | City / State / StateCode | Location details |
        | CountryName / CountryCode | Country (ISO code) |
        | PostalCode | Zip/postal code |
        | StarRating | Star rating |
        | PropertyType | Property type (e.g., Hotel, Motel, Resort) |
        | ChainName / BrandName | Chain and brand information |
        | CityLocationId / MasterCityName | Master city location data |
        | LocationIds | Associated master location IDs |
        | Phones / Fax / Email / Website | Contact information |
        | AirportCodes / TrainStations | Nearby transport hubs |
        | ProviderHotelId / ProviderFamily | Provider identification |
        | GooglePlusCode | Google Plus Code for the property |


        [Download content file template](https://hotelmapping.vervotech.com/documentation/accountname_hotels_f8b3216d-f558-4398-a498-9f279b76a625.csv)
      operationId: mappings/ExportMappingsFile
      tags:
        - Hotel Mapping/Mappings
        - Mappings
      parameters:
        - name: emailId
          in: query
          description: Email address of the user where the file would be sent.
          required: true
          example: abc@gmail.com
          schema:
            type: string
        - name: providerfamilies
          in: query
          description: >-
            String containing Provider family names separated by commas,
            specifying the provider families for which the report is to be
            generated.
          required: true
          example: abc,xyz
          schema:
            type: string
        - name: apikey
          in: header
          description: The API key for your account.
          required: true
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: accountId
          in: header
          description: The account ID of your registered account in Vervotech Mappings.
          required: true
          example: DemoAccount
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Status:
                    $ref: '#/components/schemas/Status'
                  Message:
                    $ref: '#/components/schemas/Message'
                  StatusCode:
                    description: '[References - API Status codes](#tag/References)'
                    example: 2000
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Unknown Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security: []
