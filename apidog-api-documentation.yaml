components:
  schemas:
    HotelContent:
      type: object
      description: An individual property object.
      properties:
        ProviderHotelId:
          type: string
          description: Provider Hotel Id.
          example: '3434358'
        VervotechId:
          type: integer
          format: int32
          description: Vervotech Mappings hotel id for the hotel.
          example: 16042757
        LanguageCode:
          type: string
          description: Language in which hotel details are present.
          example: en-US
        Name:
          type: string
          description: Property name.
          example: Imperial Motel
        ProviderFamily:
          type: string
          description: Provider name.
          example: EAN
        Rating:
          type: number
          format: float
          description: Information about the property’s rating.
          example: 2
        BrandName:
          type: string
          description: Hotel brand name.
          example: TAJ
        BrandCode:
          type: string
          description: Hotel brand code.
          example: T123
        ChainCode:
          type: string
          description: Hotel chain code.
          example: T123
        ChainName:
          type: string
          description: Hotel chain name
          example: C123
        MasterPropertyType:
          type: string
          description: Master Hotel Property type.
          example: Hotel
        PropertyType:
          type: string
          description: >-
            Hotel property type. Each property is associated with only one
            property type. Example - Hotel, Hotel-unknown, Motel, Hotel resort,
            Inn, Bed and Breakfast, Guest house, Cabin, Cottage, Villa,
            Apartment, Tree house, House boat, Townhouse, etc.
          example: Hotel
        Facilities:
          type: array
          items:
            $ref: '#/components/schemas/Facility'
        HeroImage:
          type: string
          description: >-
            Hero image of hotel. If hero Image from provider is null then the
            first/default image from the image array is declared as hero image
            of hotel.
          example: http://heroimage.png
        ProviderHeroImageHref:
          type: string
          description: Provider hero image URL.
          example: https://heromimae.com
        Rooms:
          type: array
          description: Room information
          items:
            $ref: '#/components/schemas/Room'
        MasterChainName:
          type: string
          description: Master Hotel Chain Name.
          example: Mariott
        PopularityScore:
          type: number
          description: Popularity score defines how much popular the given property is.
          example: 33
        ContentScore:
          type: number
          description: >-
            Score is calculated based on content quality. Some weightage is
            assigned to different content fields like images, address,
            facilities etc. So, if that part of content is present for the
            property, its associated weightage score gets added into content
            score.
          example: 12
        LicenseNumber:
          type: string
          description: License number.
          example: null
        GeoCode:
          type: object
          description: The property's location information.
          properties:
            Lat:
              type: number
              description: Latitude
              example: 25.771112
            Long:
              type: number
              description: Longitude
              example: -80.27933
        ProviderGeocodes:
          type: object
          description: The provider's location information.
          properties:
            Lat:
              type: number
              description: Latitude
              example: 25.771112
            Long:
              type: number
              description: Longitude
              example: -80.27933
        Checkout:
          type: object
          description: The property's check-out information.
          properties:
            Time:
              type: string
              description: The time by which a guest must check out.
              example: '09:22:00'
        Descriptions:
          type: array
          items:
            type: object
            description: Descriptions of a property.
            properties:
              Type:
                type: string
                description: >-
                  Description type. Example - amenities. dining, renovation,
                  business amenities, rooms, attraction, location
                example: amenities
              Text:
                type: string
                description: Description type details.
                example: Tennis court
        Policies:
          type: array
          items:
            type: object
            description: >-
              Information about property policies that guests need to be aware
              of.
            properties:
              Text:
                type: string
                description: >-
                  Description of information that may be helpful when planning a
                  trip to this property.
                example: no swimming after 8pm
              Title:
                type: string
                description: Policy title
                example: swimming time
        Checkin:
          type: object
          description: The property's check-in information.
          properties:
            BeginTime:
              type: string
              description: The time at which a property begins to allow check-ins.
              example: '09:22:00'
            EndTime:
              type: string
              description: The time at which a property stops allowing check-ins.
              example: '10:22:00'
            MinAge:
              type: number
              description: >-
                The minimum age for a customer to be able to check-in at a
                property.
            Instructions:
              type: array
              items:
                type: string
                description: The property's check-in policy.
                example: No breakfast will be provided after check-in time
            SpecialInstructions:
              type: array
              items:
                type: string
                description: >-
                  Any special instructions for checking into this property that
                  may be specific to this property.
                example: null
        Attributes:
          type: array
          description: >-
            Any additional information related to hotel in the form of key value
            pair.
          items:
            type: object
            properties:
              Key:
                type: string
                description: Key of the attribute.
                example: Smoking
              Desc:
                type: string
                description: Description of the attribute.
                example: Smoking permission
              Value:
                type: string
                example: No Smoking
        Statistics:
          type: array
          items:
            type: object
            properties:
              Id:
                type: number
                description: Id of the statistic.
                example: 23
              Name:
                type: string
                description: Name of the statistic.
                example: Missing Name
              Value:
                type: string
                example: 32
        Reviews:
          type: array
          items:
            type: object
            description: Information about the user's rating
            properties:
              Rating:
                type: number
                format: float
                description: rating for the property.
                example: 4
              Count:
                type: number
                description: The number of ratings.
                example: 21243
              RatingImage:
                type: string
                description: Rating image URL
                example: null
              Provider:
                type: string
                description: Ratings provider name like TripAdvisor
                example: TripAdvisor
              CategoryRatings:
                type: array
                description: Category Rating
                items:
                  $ref: '#/components/schemas/CategoryRating'
              GuestReviews:
                type: array
                description: Guest Reviews.
                items:
                  $ref: '#/components/schemas/GuestReview'
        PointOfInterests:
          type: array
          items:
            type: object
            properties:
              Name:
                type: string
                example: Gateway
              Type:
                type: string
                example: monument
              Distance:
                type: string
                example: 10km
              Geocode:
                type: string
                description: Geo code. Format - `<Lat>, <Lon>`
                example: null
              Unit:
                type: string
                enum:
                  - Km
                  - Miles
                  - Meters
        Fees:
          type: array
          items:
            type: object
            description: Information related to a property's fees.
            properties:
              Text:
                type: string
                description: Information of Fee type.
              Fees:
                type: string
                description: Fee amount
                example: '39.87'
              Frequency:
                type: string
                description: Frequency in which the fee amount is to be paid
                example: per night
              Assignment:
                type: string
                description: Basis on which the fee amount would be charged
                example: per room
              Type:
                type: string
                description: >-
                  Either describes resort fees and other mandatory taxes or
                  charges. May describe which services are covered by any fees,
                  such as fitness centres or internet access or describes
                  additional optional fees for items such as breakfast, Wi-Fi,
                  parking, pets etc.
                enum:
                  - Mandatory
                  - Optional
        Contact:
          type: object
          description: Container for the property's contact information.
          properties:
            Fax:
              type: string
              description: The property's fax number.
              example: +1 323 555 1234
            Web:
              type: string
              description: Hotel website.
              example: HotelSeaView.com
            Phones:
              type: array
              description: Property's phone numbers.
              items:
                type: string
                example: +1 2323-3433-3433
            Emails:
              type: array
              description: Property's email addresses.
              items:
                type: string
                example: abc@gmail.com
            Address:
              type: object
              description: Container for the property's address information.
              properties:
                Line1:
                  type: string
                  description: Address line 1.
                  example: >-
                    West Flagler Street Miami, West Flagler Street , CORAL
                    GABLES
                Line2:
                  type: string
                  description: Address line 2.
                  example: NA
                City:
                  type: string
                  description: City.
                  example: Coral Gables
                Code:
                  type: string
                  description: City Code.
                  example: '12'
                DestinationCode:
                  type: string
                  description: City Code.
                  example: ABD
                StateCode:
                  type: string
                  description: 2-letter code used for Australia, Canada, and the USA.
                  example: '121'
                State:
                  type: string
                  description: >-
                    Text name of the State/Province - more common for additional
                    countries.
                  example: Florida
                PostalCode:
                  type: string
                  description: Postal/zip code.
                  example: '3880'
                Country:
                  type: string
                  description: Country
                  example: United States of America
                CountryCode:
                  type: string
                  description: 2-letter country code, in ISO 3166-1 alpha-2 format.
                  example: US
        Images:
          type: array
          description: Contains all property images available.
          items:
            type: object
            description: An individual image.
            properties:
              Caption:
                type: string
                description: Image caption.
                example: sunset
              Category:
                type: string
                description: The category of the image.
                example: sunset
              RoomId:
                type: array
                description: >-
                  The list of room ids against which this image should be
                  tagged.
                items:
                  type: string
                example: R2127
              Links:
                type: array
                description: >-
                  Contains URLs for all of the image sizes available.  Sizes
                  include: 70 px, 350 px, and 1,000 px
                items:
                  type: object
                  properties:
                    Href:
                      type: string
                      description: >-
                        This is the image URL which is provided by the Unica.
