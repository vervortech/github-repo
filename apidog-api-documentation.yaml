  /api/2.0/mapping/rooms:
    post:
      summary: Map Rooms
      deprecated: false
      description: >-
        Maps rooms from multiple providers for a single hotel into standardized room categories. Submit all rooms from different providers for a given hotel, each identified by a unique index. The API returns grouped room mappings with standardized names, bed types, views, and amenities.
      operationId: room-mapping-2.0
      tags:
        - Room Mapping/Mapping API
        - Room Mapping APIs
      parameters:
        - name: accountId
          in: header
          description: >-
            Your Vervotech room mapping account ID. Use `demoAccount` for
            testing.
          required: true
          example: demoAccount
          schema:
            type: string
            example: demoAccount
        - name: token
          in: header
          description: >-
            Your Vervotech room mapping API token. Use `demoApiToken` for
            testing.
          required: true
          example: jansdv-859n kj2-nmsdv
          schema:
            type: string
            example: demoApiToken
        - name: correlationId
          in: header
          description: >-
            A unique identifier for this API call. Used for troubleshooting
            and issue investigation. Generate a new value for each request.
          required: true
          example: test123
          schema:
            type: string
            example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
        - name: culture
          in: header
          description: >-
            Language/locale for room mapping. Defaults to `en-US` (English).
            Set to another locale (e.g., `es-ES` for Spanish) to perform
            mappings in that language. See [Supported Languages](#tag/References).
          required: false
          example: en-US
          schema:
            type: string
            example: es-ES
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - roomRates
              properties:
                roomRates:
                  $ref: '#/components/schemas/RoomMappingBody2'
                vervotechHotelId:
                  type: string
                  description: >-
                    Optional. HotelId provided by the Vervotech mappings. If
                    provided, the mappings coverage and percentage for the API
                    call can gets better.
                  example: 201997202
                providerContentType:
                  type: string
                  description: >-
                    If "PreferredProvider", the content of the preferred
                    provider will be returned in the response. If "Merged", the
                    merged content from all the providers will be returned in
                    the response
                  enum:
                    - None
                    - PreferredProvider
                    - Merged
                  example: PreferredProvider,Merged
                providerContentPreference:
                  type: array
                  description: >-
                    If you want the room content from only one / any specific
                    provider (i.e providerContentType == PreferredProvider) then
                    you should pass the provider preferences in this parameter.
                    This parameter come into action only when
                    providerContentType parameter is set to PreferredProvider.
                  items:
                    type: string
                    description: Provider name.
            example:
              vervotechHotelId: 201997202
              providerContentType: Merged
              providerContentPreference:
                - HotelBeds
              roomRates:
                - index: 1
                  code: '201997202'
                  roomName: Deluxe Room, 1 King Bed, Non Refundable
                  description: Deluxe Room, 1 King Bed, Non Refundable,full board
                  provider: HotelBeds
                  providerHotelId: '18113069'
                  view: Sea View
                  nightlyPrice: 80
                  currency: USD
                  boardBasis: Full board
                  refundability: Non Refundable
                  beds:
                    - count: 1
                      type: Queen
                      size: Queen
                      description: 1 Queen Bed
                  attributes:
                    - key: HasBalcony
                      value: 'Yes'
                - index: 2
                  code: '201997203'
                  roomName: Deluxe Room, 1 King Bed, 1 KingBed, Refundable
                  description: Deluxe Room, 1 King Bed, 1 KingBed, Refundable
                  provider: HotelBeds
                  providerHotelId: '18113069'
                  view: Sea View
                  nightlyPrice: 80
                  currency: USD
                  boardBasis: Breakfast
                  refundability: Refundable
                  beds:
                    - count: 1
                      type: twin
                      size: twin
                      description: 1 twin Bed
                  attributes:
                    - key: HasBalcony
                      value: 'Yes'
                - index: 3
                  code: '201997204'
                  roomName: Deluxe Room, 1 King Bed, 1 KingBed
                  description: Deluxe Room, 1 King Bed, 1 KingBed
                  provider: HotelBeds
                  providerHotelId: '18113069'
                  view: Sea View
                  nightlyPrice: 80
                  currency: USD
                  boardBasis: ''
                  refundability: Refundable
                  beds:
                    - count: 1
                      type: king
                      size: king
                      description: 1 king Bed
                  attributes:
                    - key: HasBalcony
                      value: 'Yes'
                - index: 4
                  code: '3'
                  roomName: "Habitación deluxe con balcón y vista al mar"
                  description: null
                  provider: DidaTravel
                  providerHotelId: '561233'
                  beds: null
                  view: null
                  nightlyPrice: null
                  currency: null
                  attributes: null
                  boardBasis: null
                  refundability: Refundable
      responses:
        '200':
          description: Room Mapping Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: >-
                      Mandatory. True if the API call is successful. False if
                      the API call is unsuccessful.
                    example: true
                  message:
                    type: string
                    description: >-
                      Options. Error message in case of API call failure. Empty
                      in case of successful response.
                  statusCode:
                    type: number
                    description: |
                      See [References - API Status codes](#tag/References)
                  standardRooms:
                    type: array
                    items:
                      type: object
                      properties:
                        providerRoomContent:
                          $ref: '#/components/schemas/ProviderRoomContent'
                        id:
                          type: string
                          description: Identifier for the standardised room.
                          example: '1'
                        description:
                          type: string
                          description: Room Description for the standardised room.
                          example: >-
                            A sea face room with air conditioning and extra
                            rollaway beds available
                        standardName:
                          type: string
                          description: >-
                            The suggested display name by our algorithm for the
                            standardised room.
                          example: Deluxe - King (Burj Khalifa View)
                        masterTitle:
                          type: string
                          description: The room name given by the official hotel website.
                          example: King Deluxe Room with Burj Khalifa View
                        category:
                          type: string
                          description: >-
                            The standardised room category for the hotel.
                            Examples - Standard, Executive etc.
                          example: Deluxe
                        view:
                          type: string
                          description: >-
                            Optional. The standardised room view information for
                            this particular room category if available. Examples
                            - Sea, Garden etc.
                          example: Burj Khalifa
                        roomLocation:
                          type: string
                          description: >-
                            The standardised room location information for this
                            particular room if available. Examples - Highfloor,
                            Oceanfront, Seaside etc.
                          example: Highfloor
                        beds:
                          type: array
                          items:
                            $ref: '#/components/schemas/Bed'
                        occupancyType:
                          type: string
                          description: >-
                            This field represents the occupancy type of the
                            room. Examples :- Single,Double, Triple and
                            Quadruple
                          example: Single
                        facilities:
                          type: array
                          description: Standardised room amenities
                          items:
                            $ref: '#/components/schemas/Facility'
                        attributes:
                          type: array
                          description: >-
                            Room category specific attributes - `SmokingAllowed,
                            HasBalcony, HasTerrace, Accessible, HasSofaBed,
                            HasBunkBed, HasSoloUse, HasMurphyOrWallBed,
                            HasTrundleBed, HasKitchen, SharedBathroom`.
                          items:
                            $ref: '#/components/schemas/KeyValue'
                        mappedRoomRates:
                          type: array
                          description: >-
                            These are the "index" values from the API request
                            which are grouped in to this particular standardised
                            room in the response. For example, if the input
                            contains 10 rooms with index values
                            1,2,3,4,5,6,7,8,9 and 10. "mappedRoomRates" fields
                            specify which all indexes from the input rooms are
                            grouped in this standardised room. So, the value for
                            mappedRoomRates for this room can be combination of
                            any room indexes from the input.
                          items:
                            $ref: '#/components/schemas/MappedRoomRate'
                          example:
                            - inputIndex: 1
                              roomCode: 201997202
                              boardBasis: FullBoard
                              refundability: Non Refundable
                              attributes:
                                - key: RoomSize
                                  value: 200-250 SQFT
                            - inputIndex: 2
                              roomCode: 201997203
                              boardBasis: Breakfast
                              refundability: Refundable
                              attributes:
                                - key: RoomSize
                                  value: 200-250 SQFT
                            - inputIndex: 3
                              roomCode: 201997204
                              boardBasis: Room Only
                              refundability: Refundable
                              attributes:
                                - key: RoomSize
                                  value: 200-250 SQFT
              example:
                success: true
                statusCode: 1000
                message: Success
                standardRooms:
                  - standardName: Deluxe, King, Balcony
                    category: Deluxe
                    view: Sea
                    bedInfo: King
                    beds:
                      - type: King
                        count: 1
                    attributes:
                      - key: HasBalcony
                        value: 'Yes'
                    mappedRoomRates:
                      - inputIndex: 1
                        roomCode: '201997202'
                        boardBasis: Full Board
                        refundability: Non Refundable
                        isDefault: false
                        matchScore: 92
                        cfs: 92
                        attributes: []
                      - inputIndex: 2
                        roomCode: '201997203'
                        boardBasis: Bed and Breakfast
                        refundability: Refundable
                        isDefault: false
                        matchScore: 97
                        cfs: 97
                        attributes: []
                      - inputIndex: 3
                        roomCode: '201997204'
                        boardBasis: Unknown
                        refundability: Refundable
                        isDefault: false
                        matchScore: 97
                        cfs: 97
                        attributes: []
                  - standardName: Deluxe, Balcony, Sea View
                    category: Deluxe
                    view: Sea
                    bedInfo: Unknown
                    beds: []
                    attributes: []
                    warnings:
                      - code: NON_ENGLISH_ROOM_NAME
                        message: >-
                          The room name is in a non-English language
                          ("Habitación deluxe con balcón y vista al mar").
                          Mapping accuracy may be reduced. Please provide room
                          names in English for best results.
                    mappedRoomRates:
                      - inputIndex: 4
                        roomCode: '3'
                        boardBasis: Unknown
                        refundability: Refundable
                        isDefault: false
                        matchScore: 45
                        cfs: 45
                        attributes: []
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Unknown Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
