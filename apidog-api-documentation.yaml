  /hotels/GetAllVervotechIds:
    get:
      summary: Get All Vervotech IDs
      deprecated: false
      description: >-
        Returns all Vervotech hotel IDs available on your account in a paginated response. Each hotel in the system is assigned a unique Vervotech ID. Use the `resumeKey` parameter for pagination and `lastUpdateDateTime` for incremental synchronization.
      operationId: hotels/getAllVervotechIds
      tags:
        - Hotel Mapping/Metadata Content
        - Metadata Content
      parameters:
        - name: resumeKey
          in: query
          description: >-
            An encoded pagination token for incremental data retrieval.
            Pass the resumeKey from the previous response to fetch the next
            page of results. A null value indicates no further records are
            available. The resumeKey expires after 14 days.
          required: false
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: lastUpdateDateTime
          in: query
          description: >
            The starting date and time for incremental data retrieval.
            Format: `yyyy-MM-ddTHH:mm:ssZ`.
          required: false
          example: '2019-04-10T06:30:00Z'
          schema:
            type: string
        - name: apikey
          in: header
          description: The API key for your account.
          required: true
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
            type: string
        - name: accountId
          in: header
          description: The account ID of your registered account in Vervotech Mappings.
          required: true
          example: DemoAccount
          schema:
            type: string
        - name: syncId
          in: header
          description: >-
            A unique identifier for each content synchronization cycle.
            All API calls within a single sync run should share the same
            syncId to distinguish them from other sync cycles. Use a
            GUID/UUID or any unique string value.
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResumeKey:
                    $ref: '#/components/schemas/ResumeKey'
                  Status:
                    $ref: '#/components/schemas/Status'
                  Message:
                    $ref: '#/components/schemas/Message'
                  StatusCode:
                    description: '[References - API Status codes](#tag/References)'
                    example: 2000
                  VervotechIds:
                    type: array
                    description: List of Vervotech mapping ids
                    items:
                      type: number
                      example: 16558664
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
