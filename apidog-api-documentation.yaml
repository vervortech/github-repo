          required: true
          schema:
            type: number
            default: 1
        - name: limit
          in: query
          description: >
            Total number of items expected in response starting from given
            offset, maximum limit is 100.

            Example: 10
          required: false
          schema:
            type: number
            default: 10
        - name: apikey
          in: header
          description: The API key for your account.
          required: true
          example: 056ec4c3-be6b-4c36-a4cc-a403ce9592a1
          schema:
